name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version tag to create (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    container:
      image: node:lts-bullseye-slim

    steps:
      - name: Install Build Dependencies
        run: |
          apt-get update
          apt-get install -y git build-essential wget ca-certificates

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build C project
        id: build
        run: |
          wget https://github.com/premake/premake-core/releases/download/v5.0.0-beta2/premake-5.0.0-beta2-linux.tar.gz -O premake.tar.gz
          tar -xvf premake.tar.gz
          ./premake5 gmake2
          make -C build config=release

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false

      - name: Upload Static Library
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/output/Release/libAbsurdLogStatic.a
          asset_name: AbsurdLog-static-linux-amd64.a
          asset_content_type: application/octet-stream

      - name: Upload Shared Library
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/output/Release/libAbsurdLogShared.so
          asset_name: AbsurdLog-shared-linux-amd64.so
          asset_content_type: application/octet-stream

      - name: Upload Example Executable
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./build/bin/Release/AbsurdLogExample
          asset_name: AbsurdLogExample-linux-amd64
          asset_content_type: application/octet-stream
